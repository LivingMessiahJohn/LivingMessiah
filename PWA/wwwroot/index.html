<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Living Messiah</title>
	<base href="/" />
	<link rel="preload" id="webassembly" />

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link href="https://use.fontawesome.com/releases/v5.8.2/css/all.css" rel="stylesheet" 
				integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay"
				crossorigin="anonymous">

	<link rel="stylesheet" href="css/app.css" />
	<link href="PWA.styles.css" rel="stylesheet" /> <!-- To use scoped CSS files, you need this link-->

	<link href="manifest.webmanifest" rel="manifest" />
	<link rel="icon" href="favicon.ico" />
	<script>
		// Sync blocking - runs before paint
		const saved = localStorage.getItem('preferred-theme') || 'auto';
		const dark = (saved === 'dark') || (saved === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
		if (dark) document.documentElement.setAttribute('data-bs-theme', 'dark');
	</script>
	<script async src="https://js.stripe.com/v3/buy-button.js"></script>
	<script type="importmap"></script>
</head>

<body>
	<div id="app">
		<svg class="loading-progress">
			<circle r="40%" cx="50%" cy="50%" />
			<circle r="40%" cx="50%" cy="50%" />
		</svg>
		<div class="loading-progress-text"></div>
	</div>

	<div id="blazor-error-ui">
		An unhandled error has occurred.
		<a href="." class="reload">Reload</a>
		<span class="dismiss">🗙</span>
	</div>
	<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Remove navigator.serviceWorker.register('service-worker.js') -->
	<script src="_content/Toolbelt.Blazor.PWA.Updater.Service/script.min.js"></script>

	<script src="js/site.js"></script>
	<script src="js/theme.js"></script>
	<script src="js/connectivity.js"></script>
</body>

</html>
